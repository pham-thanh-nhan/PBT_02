<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
</head>
<body>

<form action="#" method="POST">

    
    <fieldset>
        <legend>Thông tin cá nhân</legend>

        <label for="name">Họ tên</label><br>
        <input type="text" id="name" name="name" required minlength="2" maxlength="50" placeholder="Nhập họ tên"><br><br>

        <label for="email">Email</label><br>
        <input type="email" id="email" name="email" required placeholder="Nhập email"><br><br>

        <label for="phone">Số điện thoại</label><br>
        <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" placeholder="Nhập 10 chữ số"><br><br>

        <label for="dob">Ngày sinh</label><br>
        <input type="date" id="dob" name="dob" max="2026-04-30"><br><br>
    </fieldset>

    
    <fieldset>
        <legend>Tài khoản</legend>

        <label for="username">Username</label><br>
        <input type="text" id="username" name="username"
               pattern="[A-Za-z0-9_]{3,20}"
               placeholder="3-20 ký tự, chữ/số/_"><br><br>

        <label for="password">Password</label><br>
        <input type="password" id="password" name="password"
               minlength="8"
               pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}"
               placeholder="Ít nhất 8 ký tự, 1 chữ hoa, 1 số"><br><br>

        <label for="confirm">Xác nhận password</label><br>
        <input type="password" id="confirm" name="confirm"
               minlength="8"
               pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}"
               placeholder="Nhập lại password"><br><br>
    </fieldset>

    
    <fieldset>
        <legend>Thông tin giao hàng</legend>

        <label for="city">Thành phố</label><br>
        <select id="city" name="city">
            <option value="">--Chọn--</option>
            <option>Hà Nội</option>
            <option>TP.HCM</option>
            <option>Đà Nẵng</option>
            <option>Cần Thơ</option>
            <option>Thanh Hóa</option>
        </select><br><br>

        <label for="district">Quận/Huyện</label><br>
        <select id="district" name="district">
            <option>Quận 1</option>
            <option>Quận 2</option>
            <option>Quận 3</option>
        </select><br><br>

        <label for="address">Địa chỉ chi tiết</label><br>
        <textarea id="address" name="address" rows="3" placeholder="Nhập địa chỉ"></textarea><br><br>

        <p>Giới tính:</p>
        <input type="radio" id="male" name="gender">
        <label for="male">Nam</label>

        <input type="radio" id="female" name="gender">
        <label for="female">Nữ</label>

        <input type="radio" id="other" name="gender">
        <label for="other">Khác</label><br><br>
    </fieldset>

    <input type="checkbox" id="agree" required>
    <label for="agree">Tôi đồng ý điều khoản</label><br><br>

    <button type="submit">Đăng ký</button>
    <button type="reset">Reset</button>

</form>

</body>
</html>
