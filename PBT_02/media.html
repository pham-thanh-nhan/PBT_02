<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Media</title>
    <link rel="stylesheet" href="./sytle.css">
</head>
<body>

<h2>Sản phẩm</h2>

<!-- Ảnh sản phẩm -->
<product class = "d-flex" >
    <figure>
    <img src="/img/anhiphone17.jpg" alt="iPhone 16 màu đen" loading="lazy" style="max-width:100%;height:auto;">
    <figcaption>iPhone 16 - 20.000.000đ</figcaption>
</figure>

<figure>
    <img src="/img/anhiphone17.jpg" alt="iPhone 16 màu trắng" loading="lazy" style="max-width:100%;height:auto;">
    <figcaption>iPhone 16 - 20.500.000đ</figcaption>
</figure>

<figure>
    <img src="/img/anhiphone17.jpg" alt="iPhone 16 màu xanh" loading="lazy" style="max-width:100%;height:auto;">
    <figcaption>iPhone 16 - 21.000.000đ</figcaption>
</figure>
</product>

<hr>

<!-- YouTube -->
<h3>Video YouTube</h3>
<iframe width="560" height="315" 
src="https://www.youtube.com/embed/-7Qi01FJ8yE?si=a4A77OykndsCW_S1"
 title="YouTube video player" frameborder="0" allow="accelerometer; 
 autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

<hr>

<!-- Video -->
<h3>Video sản phẩm</h3>
<video controls poster="poster.jpg" style="max-width:100%;">
    <source src="video.mp4" type="video/mp4">
    <source src="video.webm" type="video/webm">
    Trình duyệt không hỗ trợ video
</video>

<hr>

<!-- Audio -->
<h3>Nhạc nền</h3>
<audio controls>
    <source src="audio.mp3" type="audio/mpeg">
    Trình duyệt không hỗ trợ audio
</audio>

<hr>

<!-- SVG -->
<h3>Logo</h3>
<svg width="100" height="100">
    <circle cx="50" cy="50" r="40" fill="blue" />
</svg>

</body>
</html>
