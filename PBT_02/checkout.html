<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
</head>
<body>

<h2>Giỏ hàng</h2>

<table border="1">
    <thead>
        <tr>
            <th>STT</th>
            <th>Sản phẩm</th>
            <th>Đơn giá</th>
            <th>Số lượng</th>
            <th>Thành tiền</th>
        </tr>
    </thead>

    <tbody>
        <tr>
            <td>1</td>
            <td>iPhone 16</td>
            <td>20000000</td>
            <td>1</td>
            <td>20000000</td>
        </tr>

        <tr>
            <td>2</td>
            <td>AirPods</td>
            <td>3000000</td>
            <td>2</td>
            <td>6000000</td>
        </tr>

        <tr>
            <td>3</td>
            <td>Apple Watch</td>
            <td>8000000</td>
            <td>1</td>
            <td>8000000</td>
        </tr>
    </tbody>

    <tfoot>
        <tr>
            <td colspan="4">Tổng cộng</td>
            <td>34000000</td>
        </tr>
    </tfoot>
</table>

<hr>

<h2>Thanh toán</h2>

<form action="#" method="POST">

    <!-- phương thức -->
    <p>Phương thức thanh toán:</p>
    <input type="radio" name="pay" id="cod">
    <label for="cod">COD</label>

    <input type="radio" name="pay" id="bank">
    <label for="bank">Chuyển khoản</label>

    <input type="radio" name="pay" id="wallet">
    <label for="wallet">Ví điện tử</label>

    <br><br>

    <!-- mã giảm giá -->
    <label for="sale">Mã giảm giá</label><br>
    <input type="text" id="sale" pattern="SALE[0-9]{4}" placeholder="SALE2026">

    <br><br>

    <!-- ghi chú -->
    <label for="note">Ghi chú</label><br>
    <textarea id="note" rows="3" placeholder="Nhập ghi chú"></textarea>

    <hr>

    <!-- giao hàng -->
    <h3>Thông tin giao hàng</h3>

    <label for="date">Ngày giao</label><br>
    <input type="date" id="date" min="2026-05-02">

    <br><br>

    <label for="time">Khung giờ</label><br>
    <select id="time">
        <option>Sáng 8-12h</option>
        <option>Chiều 14-18h</option>
        <option>Tối 18-21h</option>
    </select>

    <br><br>

    <label for="day">Thời gian giao (ngày)</label><br>
    <input type="range" id="day" min="1" max="7" step="1">

    <br><br>

    <button type="submit" aria-label="Xác nhận đặt hàng">
        Đặt hàng
    </button>

</form>

<hr>

<!-- bonus -->

<h3>Tìm sản phẩm</h3>
<input list="products">
<datalist id="products">
    <option value="iPhone 16">
    <option value="AirPods">
    <option value="Apple Watch">
</datalist>

<h3>Tổng tiền (output)</h3>
<output>34000000</output>

<h3>Điểm tích lũy</h3>
<meter value="70" min="0" max="100"></meter>

</body>
</html>
